<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Football Officiating Camps</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
</head>

<body>

  <!-- STICKY HEADER -->
  <header class="header">

    <div class="header-top">
      <div class="header-brand">
        <div class="brand-mark">College Football</div>
        <div>
          <div class="brand-title">Officiating Camps</div>
          <div class="brand-subtitle">Camp/Clinic Finder &amp; Directory</div>
        </div>
      </div>
    </div>

    <!-- STATS TICKER -->
    <div class="stats-ticker">
      <div class="stats-ticker-inner">
        <div class="stat-item">
          <span class="stat-label">Active Camps</span>
          <span class="stat-value" id="statCamps">—</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">States</span>
          <span class="stat-value" id="statStates">—</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Regions</span>
          <span class="stat-value" id="statRegions">—</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Replay Available</span>
          <span class="stat-value" id="statReplay">—</span>
        </div>
